# Paper-scale amortized observation-to-source inference q_phi(U | y,H).
experiment:
  name: paper_kse_source_inference
  seed: 0

data:
  system: kse
  L: 22.0
  Nx: 64
  dt: 0.25
  n_steps: 1600
  warmup_steps: 400
  n_trajectories: 128
  ic_scale: 0.6
  window_length: 20
  stride: 4
  train_frac: 0.7
  val_frac: 0.15
  split_seed: 0
  normalization: channel_standardization

source:
  kind: spectral
  cutoff_k: 8
  eta_std: 0.05

source_inference:
  observed_fractions: [0.05, 0.1, 0.15, 0.3]
  val_windows: 1024
  model:
    base_channels: 64
    depth: 4

train:
  device: cuda
  batch_size: 128
  steps: 30000
  lr: 0.0003
  log_every: 100
  val_every: 500
